name: Build App Image

# Manually builds the OpenObserve APPLICATION image on top of the prebuilt
# wangjin252/openobserve:<base> base image and pushes it to Docker Hub
# (linux/amd64, native on GitHub's runner — no CN mirrors, no local emulation).
#
# The base image already carries the full toolchain + Node + mold linker, so this
# only compiles the frontend + release binary and assembles the runtime stage.
#
# Trigger: Actions tab → "Build App Image" → Run workflow.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKER_USERNAME  — Docker Hub account (wangjin252)
#   DOCKER_TOKEN     — Docker Hub access token
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Primary image tag to publish (defaults to app)"
        required: false
        default: "app"
      base:
        description: "Base image tag to build FROM (defaults to dev)"
        required: false
        default: "dev"

env:
  IMAGE_NAME: wangjin252/openobserve

jobs:
  build-and-push:
    name: Build & push app image (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Short git sha
        id: sha
        run: echo "short=$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/build/Dockerfile.app.amd64
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_NAME }}:${{ inputs.base }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.tag }}
            ${{ env.IMAGE_NAME }}:app-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### App image published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE_NAME }}:${{ inputs.tag }}\`  (linux/amd64)" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE_NAME }}:app-${{ steps.sha.outputs.short }}\`  (linux/amd64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Built FROM \`${{ env.IMAGE_NAME }}:${{ inputs.base }}\`"
