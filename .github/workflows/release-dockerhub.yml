name: Release Docker Image (Docker Hub)

# Triggered by pushing any tag. Builds a linux/amd64 image and pushes it to
# Docker Hub at wangjin252/openobserve:<git-tag>.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKER_USERNAME  — your Docker Hub account (wangjin252)
#   DOCKER_TOKEN     — a Docker Hub access token (Account Settings → Security)
on:
  push:
    tags:
      - "*"

env:
  IMAGE_NAME: wangjin252/openobserve

jobs:
  build-and-push:
    name: Build & push linux/amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Dockerfile.amd64 builds --release --features mimalloc --target
      # x86_64-unknown-linux-gnu on the rust:trixie-sccache builder, producing
      # a linux/amd64 image with a debian-slim runtime (shell + curl + ca-certs).
      # For a smaller distroless production image, switch file to
      # deploy/build/Dockerfile.tag.amd64.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/build/Dockerfile.amd64
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Docker image published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE_NAME }}:${{ github.ref_name }}\`  (linux/amd64)" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE_NAME }}:latest\`  (linux/amd64)" >> $GITHUB_STEP_SUMMARY
